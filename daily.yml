name: Generate Daily Display Image

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Install fonts
        run: sudo apt-get install -y fonts-freefont-ttf fonts-dejavu-core

      - name: Generate display image
        run: python3 generate_image.py

      - name: Commit and push display.png
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add display.png
          git diff --staged --quiet || git commit -m "Daily display image $(date +'%Y-%m-%d')"
          git push
