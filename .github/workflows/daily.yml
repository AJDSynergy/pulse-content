name: Daily
on:
  schedule:
  - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: pip install Pillow
      - run: sudo apt-get install -y fonts-freefont-ttf fonts-dejavu-core
      - run: python3 generate_image.py
      - run: |
      git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add display.jpg
          git diff --staged --quiet || git commit -m "Daily image"
          git pull --rebase
          git push
