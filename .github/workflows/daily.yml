name: Daily
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: pip install Pillow
      - run: sudo apt-get install -y fonts-freefont-ttf fonts-dejavu-core
      - run: python3 generate_image.py
      - name: Commit image
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git pull --rebase
          git add display.jpg
          git diff --staged --quiet || git commit -m "Daily image"
          git push
 
